services:
  discordbot:
    container_name: Discord-TTS-Bot
    build:
      context: ./
    restart: on-failure
    healthcheck:
      test: [
        "CMD-SHELL",
        "curl -f http://localhost:${HC_PORT:-8080}/heartbeat -A 'curl/some-version (+healthcheck)'"
      ]
      interval: 15s
      timeout: 5s
      retries: 2
      start_period: 10s
    env_file:
      - ${envFile}
    environment:
      - HC_PORT=${HC_PORT:-8080}
    network_mode: host
    security_opt:
      - no-new-privileges
